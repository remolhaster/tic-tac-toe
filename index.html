<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="A premium interactive Tic Tac Toe browser game with a gorgeous dark neon theme. Choose custom characters/emojis, listen to dynamic retro sound FX, and enjoy smooth glowing transitions.">
    <title>Wakar's Tic-Tac-Toe | Custom Edition</title>
    <!-- Google Fonts: Outfit -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <!-- Main Stylesheet -->
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Background glow elements for aesthetic depth -->
    <div class="bg-glow bg-glow-1"></div>
    <div class="bg-glow bg-glow-2"></div>

    <!-- WELCOME / CUSTOMIZATION SCREEN -->
    <div id="welcome-screen" class="welcome-screen">
        <header>
            <h1 class="title">WAKAR'S <span class="accent">TIC-TAC-TOE</span></h1>
            <p class="subtitle">Custom Edition</p>
        </header>

        <main class="setup-container">
            <!-- Player 1 Customizer -->
            <div class="setup-card setup-p1">
                <div class="setup-card-glow"></div>
                <h2>PLAYER 1 (CYAN)</h2>
                
                <div class="input-group">
                    <label for="welcome-p1-char">Custom Symbol</label>
                    <input type="text" id="welcome-p1-char" class="welcome-input" value="W" maxlength="4" aria-label="Player 1 Character" placeholder="W">
                </div>

                <div class="quick-pick">
                    <span class="quick-label">Quick Pick Symbol</span>
                    <div class="quick-buttons">
                        <button type="button" class="quick-btn" data-player="1">W</button>
                        <button type="button" class="quick-btn" data-player="1">X</button>
                        <button type="button" class="quick-btn" data-player="1">A</button>
                        <button type="button" class="quick-btn" data-player="1">S</button>
                        <button type="button" class="quick-btn" data-player="1">🔥</button>
                        <button type="button" class="quick-btn" data-player="1">⚡</button>
                        <button type="button" class="quick-btn" data-player="1">👑</button>
                        <button type="button" class="quick-btn" data-player="1">👽</button>
                        <button type="button" class="quick-btn" data-player="1">👾</button>
                        <button type="button" class="quick-btn" data-player="1">🎯</button>
                        <button type="button" class="quick-btn" data-player="1">🍀</button>
                        <button type="button" class="quick-btn" data-player="1">❤️</button>
                    </div>
                </div>
            </div>

            <!-- Player 2 Customizer -->
            <div class="setup-card setup-p2">
                <div class="setup-card-glow"></div>
                <h2>PLAYER 2 (MAGENTA)</h2>
                
                <div class="input-group">
                    <label for="welcome-p2-char">Custom Symbol</label>
                    <input type="text" id="welcome-p2-char" class="welcome-input" value="M" maxlength="4" aria-label="Player 2 Character" placeholder="M">
                </div>

                <div class="quick-pick">
                    <span class="quick-label">Quick Pick Symbol</span>
                    <div class="quick-buttons">
                        <button type="button" class="quick-btn" data-player="2">M</button>
                        <button type="button" class="quick-btn" data-player="2">O</button>
                        <button type="button" class="quick-btn" data-player="2">Y</button>
                        <button type="button" class="quick-btn" data-player="2">B</button>
                        <button type="button" class="quick-btn" data-player="2">❄️</button>
                        <button type="button" class="quick-btn" data-player="2">💀</button>
                        <button type="button" class="quick-btn" data-player="2">💖</button>
                        <button type="button" class="quick-btn" data-player="2">👻</button>
                        <button type="button" class="quick-btn" data-player="2">🤖</button>
                        <button type="button" class="quick-btn" data-player="2">🚀</button>
                        <button type="button" class="quick-btn" data-player="2">🛡️</button>
                        <button type="button" class="quick-btn" data-player="2">💎</button>
                    </div>
                </div>
            </div>
        </main>

        <!-- Options Panel -->
        <section class="options-panel">
            <button id="btn-sound-toggle-welcome" class="btn-sound-toggle" aria-label="Toggle sound">
                <svg class="sound-icon-on" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
                    <path d="M12 3v18l-6-6H2V9h4l6-6zm9.5 9c0-3.15-1.78-5.88-4.4-7.2l-.9 1.55c2.04 1.02 3.4 3.16 3.4 5.65s-1.36 4.63-3.4 5.65l.9 1.55c2.62-1.32 4.4-4.05 4.4-7.2zm-3.5 0c0-1.77-1-3.29-2.5-4v8c1.5-.71 2.5-2.23 2.5-4z"/>
                </svg>
                <svg class="sound-icon-off hidden" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
                    <path d="M16.5 12c0-1.77-1-3.29-2.5-4v2.2l2.45 2.45c.03-.22.05-.43.05-.65zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H2v6h4l6 6v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 3L9.91 5.09 12 7.18V3z"/>
                </svg>
                <span>Sound FX: ON</span>
            </button>
        </section>

        <!-- Launch Button -->
        <button id="btn-launch-game" class="btn btn-primary btn-launch">
            <span class="btn-glow"></span>
            LAUNCH GAME ENGINE
        </button>
    </div>

    <!-- STARTING GAME ANIMATION / LOADING OVERLAY -->
    <div id="loading-overlay" class="loading-overlay hidden">
        <div class="loading-content">
            <div class="loader-ring-container">
                <div class="loader-ring loader-ring-1"></div>
                <div class="loader-ring loader-ring-2"></div>
                <div class="loader-ring loader-ring-3"></div>
            </div>
            <h2 id="loading-status">INITIALIZING SYSTEM...</h2>
            <div class="progress-bar-container">
                <div id="progress-bar" class="progress-bar"></div>
            </div>
        </div>
    </div>

    <!-- MAIN GAME BOARD CONTAINER (HIDDEN INITIALLY) -->
    <div id="game-container" class="game-container hidden">
        <!-- Header -->
        <header>
            <div class="header-top">
                <button id="btn-sound-toggle-game" class="btn-sound-toggle icon-only" aria-label="Toggle sound">
                    <svg class="sound-icon-on" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
                        <path d="M12 3v18l-6-6H2V9h4l6-6zm9.5 9c0-3.15-1.78-5.88-4.4-7.2l-.9 1.55c2.04 1.02 3.4 3.16 3.4 5.65s-1.36 4.63-3.4 5.65l.9 1.55c2.62-1.32 4.4-4.05 4.4-7.2zm-3.5 0c0-1.77-1-3.29-2.5-4v8c1.5-.71 2.5-2.23 2.5-4z"/>
                    </svg>
                    <svg class="sound-icon-off hidden" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
                        <path d="M16.5 12c0-1.77-1-3.29-2.5-4v2.2l2.45 2.45c.03-.22.05-.43.05-.65zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H2v6h4l6 6v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 3L9.91 5.09 12 7.18V3z"/>
                    </svg>
                </button>
                <h1 class="title">WAKAR'S <span class="accent">TIC-TAC-TOE</span></h1>
                <button id="btn-back-to-menu" class="btn-back-menu" aria-label="Back to menu">Setup</button>
            </div>
            <p id="game-subtitle" class="subtitle">W vs M Edition</p>
        </header>

        <!-- Scoreboard -->
        <section class="scoreboard" aria-label="Scoreboard and Customization">
            <div class="score-card score-w">
                <div class="symbol-edit-container">
                    <input type="text" id="input-p1-char" class="symbol-input" value="W" maxlength="4" aria-label="Player 1 symbol" title="Click to customize Player 1 character">
                    <span class="player-label">P1</span>
                </div>
                <span id="score-w-value" class="score-val">0</span>
            </div>
            <div class="score-card score-draw">
                <span class="player-label" style="margin-top: 1.7rem;">Ties</span>
                <span id="score-draw-value" class="score-val">0</span>
            </div>
            <div class="score-card score-m">
                <div class="symbol-edit-container">
                    <input type="text" id="input-p2-char" class="symbol-input" value="M" maxlength="4" aria-label="Player 2 symbol" title="Click to customize Player 2 character">
                    <span class="player-label">P2</span>
                </div>
                <span id="score-m-value" class="score-val">0</span>
            </div>
        </section>

        <!-- Turn/Status Indicator -->
        <section class="status-container" aria-live="polite">
            <div id="game-status" class="game-status player-w-turn">
                <span class="status-prefix">Turn:</span>
                <span id="current-player-text" class="status-player">Player W</span>
            </div>
        </section>

        <!-- Tic Tac Toe Grid -->
        <main class="board-container">
            <div id="board" class="board" role="grid" aria-label="Tic Tac Toe Board">
                <button class="cell" data-index="0" role="gridcell" aria-label="Cell 1, empty"></button>
                <button class="cell" data-index="1" role="gridcell" aria-label="Cell 2, empty"></button>
                <button class="cell" data-index="2" role="gridcell" aria-label="Cell 3, empty"></button>
                <button class="cell" data-index="3" role="gridcell" aria-label="Cell 4, empty"></button>
                <button class="cell" data-index="4" role="gridcell" aria-label="Cell 5, empty"></button>
                <button class="cell" data-index="5" role="gridcell" aria-label="Cell 6, empty"></button>
                <button class="cell" data-index="6" role="gridcell" aria-label="Cell 7, empty"></button>
                <button class="cell" data-index="7" role="gridcell" aria-label="Cell 8, empty"></button>
                <button class="cell" data-index="8" role="gridcell" aria-label="Cell 9, empty"></button>
            </div>
        </main>

        <!-- Controls -->
        <section class="controls">
            <button id="btn-play-again" class="btn btn-primary" disabled>
                <span class="btn-glow"></span>
                Play Again
            </button>
            <button id="btn-reset" class="btn btn-secondary">
                Reset Board
            </button>
            <button id="btn-reset-scores" class="btn btn-tertiary">
                Reset Scores
            </button>
        </section>
    </div>

    <!-- Win overlay modal -->
    <div id="win-modal" class="modal" aria-hidden="true" role="dialog">
        <div class="modal-content">
            <div class="modal-glow"></div>
            <h2 id="modal-title">Victory!</h2>
            <p id="modal-message">Player W wins the match</p>
            <button id="modal-btn-play-again" class="btn btn-primary">
                <span class="btn-glow"></span>
                Play Again
            </button>
        </div>
    </div>

    <!-- Main JavaScript -->
    <script src="script.js?v=4"></script>
</body>
</html>
